<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastoreo App</title>
    <!-- 1. CSS de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #2c3e50; }
        .info-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="info-panel"><h3>Mapa de Lotes</h3></div>
    <div id="map"></div>

    <!-- 2. JS de Leaflet (Sin defer para asegurar carga inmediata) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 3. Tu archivo de control -->
    <script src="main.js"></script>
</body>
</html>
