<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pastoreo App</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        #map { height: 100vh; width: 100%; background: #1a1a1a; }
        body { margin: 0; padding: 0; }
        .panel { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="panel"><b>App Pastoreo</b> - Cargando lotes...</div>
    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        const map = L.map('map').setView([-32.41, -63.24], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const grupo = new L.FeatureGroup().addTo(map);

        function cargar(archivo, color) {
            fetch('./' + archivo)
                .then(res => {
                    if(!res.ok) throw new Error("No encontrado");
                    return res.json();
                })
                .then(data => {
                    L.geoJSON(data, {
                        style: { color: "white", fillColor: color, fillOpacity: 0.5, weight: 2 }
                    }).addTo(grupo);
                    // Esto te lleva a los lotes automáticamente
                    map.fitBounds(grupo.getBounds());
                    document.querySelector('.panel').innerHTML = "<b>App Pastoreo</b> - Lotes OK";
                })
                .catch(err => console.log("Error con: " + archivo));
        }

        // Usamos los nuevos nombres de archivos .json
        cargar('tambo.json', '#3498db');
        cargar('cria.json', '#e67e22');
        cargar('agri.json', '#f1c40f');
    </script>
</body>
</html>
