<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastoreo App</title>
    
    <!-- Librerías Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100vh; background: #2c3e50; }
        .info-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
        }
        .legend {
            background: white; padding: 10px; line-height: 18px; color: #333;
            border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif; font-size: 12px;
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="info-panel"><h3>Gestión de Pastoreo</h3></div>
    <div id="map"></div>

    <!-- Tu lógica siempre al final -->
    <script src="main.js"></script>
</body>
</html>
